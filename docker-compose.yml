version: "3.9"

services:
  backend:
    image: shivamdevthakur/wastewise-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production   
    container_name: wastewise-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - wisenet

  frontend:
    image: shivamdevthakur/wastewise-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production  
    container_name: wastewise-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always
    networks:
      - wisenet

networks:
  wisenet:
    driver: bridge